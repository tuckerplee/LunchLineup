version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    groups:
      npm-nonmajor:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directories:
      - /apps/engine
      - /apps/worker
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    groups:
      python-nonmajor:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directories:
      - /
      - /infrastructure/docker
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    groups:
      container-images:
        patterns:
          - "*"