name: LunchLineup CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '23 9 * * 1'
  workflow_dispatch:
    inputs:
      bootstrap_release_registry:
        description: Populate an empty registry from the independently retained current-live release
        required: true
        type: boolean
        default: false
      bootstrap_live_source_sha:
        description: Exact 40-character source SHA currently served by production
        required: false
        type: string
      bootstrap_live_release_bundle_uri:
        description: Independent https:// or s3:// URI for the retained current-live v2 release bundle
        required: false
        type: string
      bootstrap_confirmation:
        description: Exact bootstrap-current-live-release:<live SHA> confirmation
        required: false
        type: string
      emergency_production_rollback:
        description: Run the protected production emergency rollback path
        required: true
        type: boolean
        default: false
      emergency_rollback_source_sha:
        description: Exact retained 40-character release SHA to restore
        required: false
        type: string
      emergency_rollback_confirmation:
        description: Exact rollback-production-to:<target SHA> confirmation
        required: false
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/tuckerplee/lunchlineup
  DEPLOY_RELEASE_SHA: ${{ github.sha }}
  ZAP_IMAGE: ${{ vars.ZAP_IMAGE }}
  ARTILLERY_IMAGE: artilleryio/artillery:2.0.33@sha256:ee382d480f5cb8473c52fe94cb8e1505a9564ce2accbc94114098e0be06dff56
  RELEASE_BUNDLE_CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main
  RELEASE_BUNDLE_OIDC_ISSUER: https://token.actions.githubusercontent.com
  RECOVERY_ADAPTER_CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main
  RECOVERY_ADAPTER_OIDC_ISSUER: https://token.actions.githubusercontent.com
  RELEASE_REGISTRY_COMMAND_TIMEOUT_MS: '120000'
  RELEASE_REGISTRY_FETCH_MAX_BYTES: '10485760'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  manual-production-operation-policy:
    name: "Validate Manual Production Operation"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Reject conflicting production operations
        env:
          BOOTSTRAP_RELEASE_REGISTRY: ${{ inputs.bootstrap_release_registry }}
          EMERGENCY_PRODUCTION_ROLLBACK: ${{ inputs.emergency_production_rollback }}
        run: |
          set -euo pipefail
          if [ "$BOOTSTRAP_RELEASE_REGISTRY" = "true" ] && [ "$EMERGENCY_PRODUCTION_ROLLBACK" = "true" ]; then
            echo "Registry bootstrap and emergency rollback are mutually exclusive." >&2
            exit 1
          fi

  # --- Stage 1-2: Static Analysis ---
  static-analysis:
    name: "Stage 1-2: Lint, Format & Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: "1. Lint & Format"
        run: npx turbo run lint
      - name: "2. Type Check"
        run: npm run typecheck
      - name: "2b. Migration SaaS and hygiene tests"
        run: npm run test:migration
      - name: "2c. Validate observability configs and Prometheus rule fixtures"
        run: node scripts/verify-observability-configs.mjs --root . --tool-mode container

  terraform-validation:
    name: "Terraform: Format, Validate & Test"
    needs: static-analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: '1.13.5'
          terraform_wrapper: false
      - run: terraform fmt -check -recursive infrastructure/terraform
      - run: terraform -chdir=infrastructure/terraform/production init -backend=false -input=false
      - run: terraform -chdir=infrastructure/terraform/production validate
      - run: terraform -chdir=infrastructure/terraform/production test
  # --- Stage 3: SAST Security Scan ---
  sast:
    name: "Stage 3: SAST (Semgrep)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run digest-pinned Semgrep and retain its exit status
        id: semgrep
        env:
          SEMGREP_IMAGE: semgrep/semgrep:1.169.0@sha256:2b33f46ba66cf8cc2ad59ccfa7d22951fd00c632c38f1339e84ec8e6e641a942
        run: |
          set +e
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/src" \
            --workdir /src \
            "$SEMGREP_IMAGE" \
            semgrep scan --config p/default --error --sarif --output semgrep.sarif .
          scan_status=$?
          set -e
          echo "exit-code=$scan_status" >> "$GITHUB_OUTPUT"
          test -s semgrep.sarif
      - name: Upload Semgrep SARIF
        if: ${{ always() && hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
          wait-for-processing: true
      - name: Enforce Semgrep result
        if: always()
        env:
          SEMGREP_EXIT_CODE: ${{ steps.semgrep.outputs.exit-code }}
        run: test "$SEMGREP_EXIT_CODE" = "0"

  codeql:
    name: "Stage 3: CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml
      - name: Analyze and upload CodeQL results
        uses: github/codeql-action/analyze@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          category: /language:${{ matrix.language }}
          wait-for-processing: true

  # --- Stage 4: Dependency Audit ---
  dependency-audit:
    # --- Stage 4: Dependency Audit ---
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Reject newly introduced vulnerable dependencies
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: npm audit
        run: npm run audit:prod
      - name: License check
        env:
          NPM_CONFIG_OFFLINE: 'true'
        run: |
          test -x ./node_modules/.bin/license-checker
          ./node_modules/.bin/license-checker --failOn "GPL-2.0;GPL-3.0"

  # --- Stage 5: Unit Tests (90%+ coverage gate) ---
  unit-tests:
    name: "Stage 5: Unit Tests"
    needs: [static-analysis, sast, codeql, dependency-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - run: npm ci
      - name: Install Playwright browser for Vitest browser tests
        run: npx playwright install --with-deps chromium
      - name: Run Vitest
        run: npx turbo run test -- --coverage
      - name: Run PyTest
        run: |
          cd apps/engine
          pip install -r requirements.txt
          python -m pytest --cov=src --cov-fail-under=90
      - name: Run worker unit tests
        working-directory: apps/worker
        run: |
          pip install -r requirements.txt
          python -m unittest discover -s tests

  # --- Stage 6-7: Build & Push Docker Images ---
  build-images:
    name: "Stage 6-7: Build Docker Images"
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    outputs:
      api_ref: ${{ steps.release_manifest.outputs.api_ref }}
      api_v2_ref: ${{ steps.release_manifest.outputs.api_v2_ref }}
      web_ref: ${{ steps.release_manifest.outputs.web_ref }}
      engine_ref: ${{ steps.release_manifest.outputs.engine_ref }}
      worker_ref: ${{ steps.release_manifest.outputs.worker_ref }}
      migrate_ref: ${{ steps.release_manifest.outputs.migrate_ref }}
      control_ref: ${{ steps.release_manifest.outputs.control_ref }}
      backup_ref: ${{ steps.release_manifest.outputs.backup_ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push API
        id: build_api
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push API v2
        id: build_api_v2
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api-v2
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/api-v2:${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify web public build config
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_OIDC_ENABLED: ${{ vars.NEXT_PUBLIC_OIDC_ENABLED }}
          NEXT_PUBLIC_SIGNUP_MODE: ${{ vars.NEXT_PUBLIC_SIGNUP_MODE }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL }}
          NEXT_PUBLIC_SUPPORT_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_SUPPORT_CONTACT_EMAIL }}
          NEXT_PUBLIC_DPA_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_DPA_CONTACT_EMAIL }}
          NEXT_PUBLIC_APP_ORIGIN: ${{ vars.NEXT_PUBLIC_APP_ORIGIN }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_ENV: ${{ vars.NEXT_PUBLIC_APP_ENV }}
        run: |
          set -euo pipefail
          for name in \
            NEXT_PUBLIC_API_URL \
            NEXT_PUBLIC_OIDC_ENABLED \
            NEXT_PUBLIC_SIGNUP_MODE \
            NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL \
            NEXT_PUBLIC_SUPPORT_CONTACT_EMAIL \
            NEXT_PUBLIC_DPA_CONTACT_EMAIL \
            NEXT_PUBLIC_APP_ORIGIN \
            NEXT_PUBLIC_APP_URL \
            NEXT_PUBLIC_APP_ENV
          do
            if [ -z "${!name:-}" ]; then
              echo "$name is required for main-branch web image builds." >&2
              exit 1
            fi
          done
          case "$NEXT_PUBLIC_API_URL" in
            https://*|/api/*) ;;
            *) echo "NEXT_PUBLIC_API_URL must be https or a same-origin /api path." >&2; exit 1 ;;
          esac
          if [ "$NEXT_PUBLIC_SIGNUP_MODE" = "open" ] && [ -z "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}" ]; then
            echo "NEXT_PUBLIC_TURNSTILE_SITE_KEY is required when NEXT_PUBLIC_SIGNUP_MODE=open." >&2
            exit 1
          fi
      - name: Build & Push Web
        id: build_web
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || '/api/v1' }}
            NEXT_PUBLIC_OIDC_ENABLED=${{ vars.NEXT_PUBLIC_OIDC_ENABLED || 'false' }}
            NEXT_PUBLIC_SIGNUP_MODE=${{ vars.NEXT_PUBLIC_SIGNUP_MODE || 'closed_beta' }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY || '' }}
            NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL=${{ vars.NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL || 'privacy@lunchlineup.example' }}
            NEXT_PUBLIC_SUPPORT_CONTACT_EMAIL=${{ vars.NEXT_PUBLIC_SUPPORT_CONTACT_EMAIL || 'support@lunchlineup.example' }}
            NEXT_PUBLIC_DPA_CONTACT_EMAIL=${{ vars.NEXT_PUBLIC_DPA_CONTACT_EMAIL || 'privacy@lunchlineup.example' }}
            NEXT_PUBLIC_APP_ORIGIN=${{ vars.NEXT_PUBLIC_APP_ORIGIN || 'http://localhost:3000' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
            NEXT_PUBLIC_APP_ENV=${{ vars.NEXT_PUBLIC_APP_ENV || 'production' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push Engine
        id: build_engine
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.engine
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push Worker
        id: build_worker
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.worker
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push Migrations
        id: build_migrate
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.migrations
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/migrate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push Control Plane
        id: build_control
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.control
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/control:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push Backup
        id: build_backup
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backup
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/backup:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Write immutable release manifest
        id: release_manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          API_DIGEST: ${{ steps.build_api.outputs.digest }}
          API_V2_DIGEST: ${{ steps.build_api_v2.outputs.digest }}
          WEB_DIGEST: ${{ steps.build_web.outputs.digest }}
          ENGINE_DIGEST: ${{ steps.build_engine.outputs.digest }}
          WORKER_DIGEST: ${{ steps.build_worker.outputs.digest }}
          MIGRATE_DIGEST: ${{ steps.build_migrate.outputs.digest }}
          CONTROL_DIGEST: ${{ steps.build_control.outputs.digest }}
          BACKUP_DIGEST: ${{ steps.build_backup.outputs.digest }}
          DOMAIN: ${{ vars.DOMAIN }}
          PRODUCTION_API_HEALTH_URL: ${{ vars.PRODUCTION_API_HEALTH_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_OIDC_ENABLED: ${{ vars.NEXT_PUBLIC_OIDC_ENABLED }}
          NEXT_PUBLIC_SIGNUP_MODE: ${{ vars.NEXT_PUBLIC_SIGNUP_MODE }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL }}
          NEXT_PUBLIC_SUPPORT_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_SUPPORT_CONTACT_EMAIL }}
          NEXT_PUBLIC_DPA_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_DPA_CONTACT_EMAIL }}
          NEXT_PUBLIC_APP_ORIGIN: ${{ vars.NEXT_PUBLIC_APP_ORIGIN }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_ENV: ${{ vars.NEXT_PUBLIC_APP_ENV }}
        run: |
          set -euo pipefail
          mkdir -p .release
          public_build_config="$(node <<'NODE'
          const crypto = require('node:crypto');
          const keys = [
            'NEXT_PUBLIC_API_URL',
            'NEXT_PUBLIC_OIDC_ENABLED',
            'NEXT_PUBLIC_SIGNUP_MODE',
            'NEXT_PUBLIC_TURNSTILE_SITE_KEY',
            'NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL',
            'NEXT_PUBLIC_SUPPORT_CONTACT_EMAIL',
            'NEXT_PUBLIC_DPA_CONTACT_EMAIL',
            'NEXT_PUBLIC_APP_ORIGIN',
            'NEXT_PUBLIC_APP_URL',
            'NEXT_PUBLIC_APP_ENV',
          ];
          const values = Object.fromEntries(keys.map((key) => [key, process.env[key] || '']));
          const canonical = JSON.stringify({ keys, values });
          process.stdout.write(JSON.stringify({
            sha256: crypto.createHash('sha256').update(canonical).digest('hex'),
            keys,
            values,
          }));
          NODE
          )"
          production_health_proof="$(node <<'NODE'
          const domain = process.env.DOMAIN || '';
          const url = process.env.PRODUCTION_API_HEALTH_URL || '';
          process.stdout.write(JSON.stringify({ domain, url }));
          NODE
          )"
          deployment_contract="$(RELEASE_REQUIRE_TRACKED_INPUTS=true node scripts/write-deployment-contract.mjs --bundle-output .release/deployment-contract.bundle.json)"
          API_REF="${IMAGE_PREFIX}/api:${GITHUB_SHA}@${API_DIGEST}"
          API_V2_REF="${IMAGE_PREFIX}/api-v2:${GITHUB_SHA}@${API_V2_DIGEST}"
          WEB_REF="${IMAGE_PREFIX}/web:${GITHUB_SHA}@${WEB_DIGEST}"
          ENGINE_REF="${IMAGE_PREFIX}/engine:${GITHUB_SHA}@${ENGINE_DIGEST}"
          WORKER_REF="${IMAGE_PREFIX}/worker:${GITHUB_SHA}@${WORKER_DIGEST}"
          MIGRATE_REF="${IMAGE_PREFIX}/migrate:${GITHUB_SHA}@${MIGRATE_DIGEST}"
          CONTROL_REF="${IMAGE_PREFIX}/control:${GITHUB_SHA}@${CONTROL_DIGEST}"
          BACKUP_REF="${IMAGE_PREFIX}/backup:${GITHUB_SHA}@${BACKUP_DIGEST}"
          cat > .release/release-manifest.json <<JSON
          {
            "version": 1,
            "sourceSha": "${GITHUB_SHA}",
            "imagePrefix": "${IMAGE_PREFIX}",
            "workflowRun": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "publicBuildConfig": ${public_build_config},
            "productionHealthProof": ${production_health_proof},
            "deploymentContract": ${deployment_contract},
            "images": {
              "api": { "ref": "${API_REF}", "digest": "${API_DIGEST}", "dockerfile": "infrastructure/docker/Dockerfile.api" },
              "api-v2": { "ref": "${API_V2_REF}", "digest": "${API_V2_DIGEST}", "dockerfile": "infrastructure/docker/Dockerfile.api-v2" },
              "web": { "ref": "${WEB_REF}", "digest": "${WEB_DIGEST}", "dockerfile": "infrastructure/docker/Dockerfile.web" },
              "engine": { "ref": "${ENGINE_REF}", "digest": "${ENGINE_DIGEST}", "dockerfile": "infrastructure/docker/Dockerfile.engine" },
              "worker": { "ref": "${WORKER_REF}", "digest": "${WORKER_DIGEST}", "dockerfile": "infrastructure/docker/Dockerfile.worker" },
              "migrate": { "ref": "${MIGRATE_REF}", "digest": "${MIGRATE_DIGEST}", "dockerfile": "infrastructure/docker/Dockerfile.migrations" },
              "control": { "ref": "${CONTROL_REF}", "digest": "${CONTROL_DIGEST}", "dockerfile": "infrastructure/docker/Dockerfile.control" },
              "backup": { "ref": "${BACKUP_REF}", "digest": "${BACKUP_DIGEST}", "dockerfile": "infrastructure/docker/Dockerfile.backup" }
            }
          }
          JSON
          {
            echo "api_ref=${API_REF}"
            echo "api_v2_ref=${API_V2_REF}"
            echo "web_ref=${WEB_REF}"
            echo "engine_ref=${ENGINE_REF}"
            echo "worker_ref=${WORKER_REF}"
            echo "migrate_ref=${MIGRATE_REF}"
            echo "control_ref=${CONTROL_REF}"
            echo "backup_ref=${BACKUP_REF}"
          } >> "$GITHUB_OUTPUT"
          node scripts/verify-release-artifacts.mjs .release/release-manifest.json --source-sha "$GITHUB_SHA"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: release-manifest
          path: |
            .release/release-manifest.json
            .release/deployment-contract.bundle.json
          if-no-files-found: error

  # --- Stage 8-10: Ephemeral Environment & Integration Tests ---
  integration-tests:
    name: "Stage 8-10: Integration Tests (Ephemeral Stack)"
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: lunchlineup_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
      rabbitmq:
        image: rabbitmq:3-alpine@sha256:d7af1c87c5f1eda13fcfca06db452bf3aeab6619fc3358b68535c0c02c4e52bc
        env:
          RABBITMQ_DEFAULT_USER: lunchlineup_ci
          RABBITMQ_DEFAULT_PASS: rabbit-testpass
          RABBITMQ_DEFAULT_VHOST: /
        ports: ['5672:5672']
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            apps/engine/requirements.txt
            apps/worker/requirements.txt
      - run: npm ci
      - name: Install engine and worker integration dependencies
        run: python -m pip install -r apps/engine/requirements.txt -r apps/worker/requirements.txt
      - name: "9. Run Migrations"
        run: node scripts/apply-db-migrations.mjs
        env:
          DATABASE_URL: postgresql://lunchlineup_app:app-testpass@localhost:5432/lunchlineup_test
          MIGRATION_DATABASE_URL: postgresql://root:testpass@localhost:5432/lunchlineup_test
          APP_DB_USER: lunchlineup_app
          APP_DB_PASSWORD: app-testpass
          PLATFORM_ADMIN_DB_CONTEXT_SECRET: ci-platform-admin-capability-secret-1234567890
          POSTGRES_USER: root
          POSTGRES_PASSWORD: testpass
          DATA_TARGET_ENV: test
          WEBHOOK_DELIVERY_ENCRYPTION_KEY_CURRENT: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - name: "10. Integration Tests"
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://lunchlineup_app:app-testpass@localhost:5432/lunchlineup_test
          MIGRATION_DATABASE_URL: postgresql://root:testpass@localhost:5432/lunchlineup_test
          PLATFORM_ADMIN_DB_CONTEXT_SECRET: ci-platform-admin-capability-secret-1234567890
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://lunchlineup_ci:rabbit-testpass@localhost:5672/%2f
          ENGINE_GRPC_URL: 127.0.0.1:50051

  # --- Stage 11: DAST (OWASP ZAP) ---
  dast:
    # --- Stage 11: DAST (OWASP ZAP) ---
    needs: [integration-tests, build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      COMPOSE_PROJECT_NAME: lunchlineup-ci-dast
      SMOKE_TARGET_URL: http://localhost:8080
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-manifest
          path: .release
      - name: Prepare smoke stack environment
        run: node scripts/write-smoke-env.mjs .env.smoke
      - name: Verify release manifest
        run: node scripts/verify-release-artifacts.mjs .release/release-manifest.json --source-sha "$GITHUB_SHA"
      - name: Pull smoke stack images by digest
        env:
          API_IMAGE_REF: ${{ needs.build-images.outputs.api_ref }}
          API_V2_IMAGE_REF: ${{ needs.build-images.outputs.api_v2_ref }}
          WEB_IMAGE_REF: ${{ needs.build-images.outputs.web_ref }}
          ENGINE_IMAGE_REF: ${{ needs.build-images.outputs.engine_ref }}
          WORKER_IMAGE_REF: ${{ needs.build-images.outputs.worker_ref }}
          MIGRATE_IMAGE_REF: ${{ needs.build-images.outputs.migrate_ref }}
          CONTROL_IMAGE_REF: ${{ needs.build-images.outputs.control_ref }}
          BACKUP_IMAGE_REF: ${{ needs.build-images.outputs.backup_ref }}
        run: |
          set -euo pipefail
          for ref in "$API_IMAGE_REF" "$API_V2_IMAGE_REF" "$WEB_IMAGE_REF" "$ENGINE_IMAGE_REF" "$WORKER_IMAGE_REF" "$MIGRATE_IMAGE_REF" "$CONTROL_IMAGE_REF" "$BACKUP_IMAGE_REF"; do
            docker pull "$ref"
          done
          for service in api api-v2 web engine worker migrate control backup; do
            docker image inspect "${IMAGE_PREFIX}/${service}:${IMAGE_TAG}" > /dev/null
          done
          docker compose --env-file .env.smoke pull proxy pgbouncer postgres redis rabbitmq
      - name: Start smoke stack
        run: docker compose --env-file .env.smoke up -d --no-build --pull never migrate proxy web api api-v2 engine worker pgbouncer postgres redis rabbitmq
      - name: Wait for smoke target
        run: |
          for attempt in {1..60}; do
            if curl -fsS "$SMOKE_TARGET_URL/health"; then
              exit 0
            fi
            docker compose ps
            sleep 5
          done
          docker compose logs --tail=150
          exit 1
      - name: Run candidate-bound DAST helper
        env:
          DAST_OUTPUT_DIR: ${{ runner.temp }}/lunchlineup-candidate-dast/${{ github.sha }}
          EXPECTED_SOURCE_SHA: ${{ github.sha }}
        run: bash scripts/run-dast.sh "$SMOKE_TARGET_URL"
      - name: Upload source-bound DAST evidence bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: candidate-dast-${{ github.sha }}
          path: |
            ${{ runner.temp }}/lunchlineup-candidate-dast/${{ github.sha }}/dast-evidence-${{ github.sha }}.json
            ${{ runner.temp }}/lunchlineup-candidate-dast/${{ github.sha }}/dast-zap-${{ github.sha }}.json
            ${{ runner.temp }}/lunchlineup-candidate-dast/${{ github.sha }}/dast-zap-${{ github.sha }}.html
          if-no-files-found: error
          retention-days: 90
      - name: Stop smoke stack
        if: always()
        run: |
          docker compose --env-file .env.smoke down -v
          rm -f .env.smoke secrets/metrics_token

  # --- Stage 12: E2E Tests (Playwright) ---
  e2e-tests:
    # --- Stage 12: E2E Tests (Playwright) ---
    needs: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
