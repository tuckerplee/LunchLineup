global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: production-paging-webhook
  routes:
    - matchers:
        - severity="critical"
      receiver: production-paging-webhook
      repeat_interval: 1h

receivers:
  - name: production-paging-webhook
    webhook_configs:
      - url_file: /run/secrets/alertmanager_webhook_url
        send_resolved: true
