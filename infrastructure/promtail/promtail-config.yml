server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: lunchlineup-containers
    static_configs:
      - targets: [localhost]
        labels:
          job: lunchlineup
          host: ${PROMTAIL_HOST}
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - source_labels: [__path__]
        regex: /var/lib/docker/containers/([^/]+)/.*
        target_label: container_id
        replacement: $1
