# infrastructure/prometheus/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: lunchlineup
    environment: lunchlineup-compose

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    scrape_interval: 10s

  - job_name: 'engine'
    static_configs:
      - targets: ['engine:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'worker'
    static_configs:
      - targets: ['worker:3003']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'webhook-replay'
    static_configs:
      - targets: ['webhook-replay:3004']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'control'
    static_configs:
      - targets: ['control:3001']
    metrics_path: '/api/metrics'
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    scrape_interval: 30s

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
