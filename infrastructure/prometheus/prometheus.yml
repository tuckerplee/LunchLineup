# infrastructure/prometheus/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: lunchlineup
    environment: ${ENVIRONMENT:-development}

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api'
    static_configs:
      - targets: ['lunchlineup-api:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'engine'
    static_configs:
      - targets: ['lunchlineup-engine:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'worker'
    static_configs:
      - targets: ['lunchlineup-worker:3003']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'control'
    static_configs:
      - targets: ['lunchlineup-control:3001']
    metrics_path: '/api/metrics'
    scrape_interval: 30s
